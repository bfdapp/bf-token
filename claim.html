<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BF 生态分红领取中心</title>
    
    <!-- 已自动帮你加好 BF 头像图标 -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: linear-gradient(160deg, #050a18, #101a33);
            color:#fff;
            font-family: "Microsoft Yahei",sans-serif;
            min-height:100vh;
            padding:30px 15px;
        }
        .main-card{
            max-width:520px;
            margin:0 auto;
            background: rgba(16,26,51,0.85);
            border-radius:24px;
            padding:35px 28px;
            border:1px solid rgba(255,210,80,0.25);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .title{
            text-align:center;
            font-size:26px;
            font-weight:700;
            color:#ffd250;
            letter-spacing:2px;
            margin-bottom:35px;
        }
        .info-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:16px 18px;
            background:rgba(255,255,255,0.06);
            border-radius:14px;
            margin-bottom:14px;
            font-size:15px;
        }
        .info-value{
            color:#ffd250;
            font-weight:600;
            word-break:break-all;
        }
        .btn{
            width:100%;
            height:52px;
            border:none;
            border-radius:14px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            margin-top:14px;
            transition: all 0.3s ease;
        }
        .btn:active{transform:scale(0.97);}
        .btn-connect{
            background:linear-gradient(90deg,#407bff,#2554d1);
            color:#fff;
        }
        .btn-claim{
            background:linear-gradient(90deg,#27c075,#1a9c5c);
            color:#fff;
        }
        .btn-back{
            background:rgba(255,255,255,0.08);
            color:#e5e7eb;
            border:1px solid rgba(255,255,255,0.15);
        }
        .tip-text{
            text-align:center;
            margin-top:30px;
            font-size:13px;
            color:#94a3b8;
            line-height:1.7;
        }

        .wallet-modal{
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.85);
            display:flex;align-items:center;justify-content:center;
            z-index:999;display:none;
        }
        .wallet-box{
            width:88%;max-width:440px;
            background:#0f172a;
            border-radius:20px;padding:30px 25px;
            border:1px solid rgba(255,210,80,0.2);
        }
        .wallet-title{
            font-size:20px;font-weight:bold;
            text-align:center;margin-bottom:25px;
            color:#ffd250;
        }
        .wallet-item{
            display:flex;align-items:center;
            padding:16px 20px;
            background:rgba(255,255,255,0.07);
            border-radius:14px;margin-bottom:13px;
            cursor:pointer;font-size:16px;transition:0.25s;
        }
        .wallet-item:hover{
            background:rgba(255,210,80,0.18);
        }
        .close-modal{
            text-align:center;margin-top:20px;
            color:#94a3b8;cursor:pointer;
            padding:12px;font-size:15px;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h2 class="title">BF 生态分红领取中心</h2>
        <div class="info-item"><span>连接钱包地址</span><span class="info-value" id="walletAddr">未连接</span></div>
        <div class="info-item"><span>持有BF资产</span><span class="info-value" id="balanceNum">0.0000</span></div>
        <div class="info-item"><span>当前可领分红</span><span class="info-value" id="divNum">0.0000</span></div>
        <div class="info-item"><span>已接入钱包</span><span class="info-value" id="walletType">暂无</span></div>

        <!-- 一键查询三级人脉 -->
        <div class="info-item"><span>一级直推人数</span><span class="info-value" id="level1">0</span></div>
        <div class="info-item"><span>二级团队人数</span><span class="info-value" id="level2">0</span></div>
        <div class="info-item"><span>三级团队人数</span><span class="info-value" id="level3">0</span></div>

        <button class="btn btn-connect" onclick="openWalletSelect()">选择钱包连接</button>
        <button class="btn btn-claim" onclick="manualClaim()">一键领取分红</button>
        <button class="btn btn-connect" onclick="checkMyTeam()">一键查询我的团队</button>
        <button class="btn btn-back" onclick="location.href='index.html'">返回官方首页</button>

        <div class="tip-text">
            全面兼容主流Web3钱包 | BSC智能链专属通道<br>
            安全连接 · 一键领取 · 实时查询
        </div>
    </div>

    <div class="wallet-modal" id="walletModal">
        <div class="wallet-box">
            <div class="wallet-title">请选择您的钱包</div>
            <div class="wallet-item" onclick="connectMetaMask()">🦊 小狐狸 MetaMask</div>
            <div class="wallet-item" onclick="connectTrust()">💎 Trust Wallet</div>
            <div class="wallet-item" onclick="connectTP()">💰 TokenPocket TP钱包</div>
            <div class="wallet-item" onclick="connectOKX()">🪙 OKX 欧易钱包</div>
            <div class="wallet-item" onclick="connectBitget()">📈 Bitget 比特钱包</div>
            <div class="close-modal" onclick="closeWalletSelect()">关闭选择</div>
        </div>
    </div>

<script>
const CONTRACT_ADDR = "0x31ecC30e91A18dD1eCcCA041e3E1Ecd57c522340";
const ABI = [
    {"inputs":[],"name":"claimDividend","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"getMyPending","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"a","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"userLevel1Count","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"userLevel2Count","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"userLevel3Count","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let web3,account,contract;
const modal = document.getElementById("walletModal");

function openWalletSelect(){modal.style.display = "flex";}
function closeWalletSelect(){modal.style.display = "none";}

async function walletConnect(walletName){
    closeWalletSelect();
    if(!window.ethereum){
        alert(`暂未检测到【${walletName}】，请先打开对应钱包再重试`);
        return;
    }
    try{
        let accounts = await ethereum.request({method:"eth_requestAccounts"});
        account = accounts[0];
        web3 = new Web3(ethereum);
        contract = new web3.eth.Contract(ABI,CONTRACT_ADDR);
        document.getElementById("walletAddr").innerText = account.slice(0,12)+"..."+account.slice(-8);
        document.getElementById("walletType").innerText = walletName;
        refreshData();
    }catch(e){
        alert("钱包连接失败，请切换网络或重新授权");
    }
}

function connectMetaMask(){walletConnect("小狐狸 MetaMask")}
function connectTrust(){walletConnect("Trust 通用钱包")}
function connectTP(){walletConnect("TP 多链钱包")}
function connectOKX(){walletConnect("OKX 欧易钱包")}
function connectBitget(){walletConnect("Bitget 比特钱包")}

async function refreshData(){
    if(!account)return;
    try{
        let bal = await contract.methods.balanceOf(account).call();
        let pd = await contract.methods.getMyPending().call();
        document.getElementById("balanceNum").innerText = Number(web3.utils.fromWei(bal,"ether")).toFixed(4);
        document.getElementById("divNum").innerText = Number(web3.utils.fromWei(pd,"ether")).toFixed(4);
    }catch(e){}
}

async function manualClaim(){
    if(!account)return alert("请先选择并连接您的钱包");
    try{
        await contract.methods.claimDividend().send({from:account});
        alert("🎉 分红领取成功，资产已到账！");
        refreshData();
    }catch(e){
        alert("领取失败，请检查链网络与手续费");
    }
}

// 一键查询三级人脉
async function checkMyTeam(){
    if(!account)return alert("请先连接钱包");
    try{
        let l1 = await contract.methods.userLevel1Count(account).call();
        let l2 = await contract.methods.userLevel2Count(account).call();
        let l3 = await contract.methods.userLevel3Count(account).call();
        
        document.getElementById("level1").innerText = l1;
        document.getElementById("level2").innerText = l2;
        document.getElementById("level3").innerText = l3;
        
        alert(`✅ 查询成功！
一级直推：${l1} 人
二级团队：${l2} 人
三级团队：${l3} 人`);
    }catch(e){
        alert("查询失败，请检查合约是否开启人脉机制");
    }
}

if(window.ethereum){
    ethereum.on("accountsChanged",()=>location.reload());
}
</script>
</body>
</html>
