<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF 分红领取中心</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;font-family:sans-serif;min-height:100vh;padding:20px;}
        .card {max-width:500px;margin:0 auto;background:rgba(30,41,59,0.85);border-radius:20px;padding:30px;border:1px solid rgba(255,215,0,0.2);}
        .title {text-align:center;font-size:24px;font-weight:bold;color:#ffd700;margin-bottom:30px;}
        .item {display:flex;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.08);border-radius:12px;margin-bottom:12px;font-size:15px;}
        .val {color:#ffd700;font-weight:600;word-break:break-all;}
        .btn {width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;}
        .btn-conn {background:linear-gradient(90deg,#3b82f6,#2563eb);color:#fff;}
    </style>
</head>
<body>
    <div class="card">
        <h2 class="title">BF 分红领取中心</h2>
        <div class="item"><span>钱包地址</span><span class="val" id="addr">未连接</span></div>
        <button class="btn btn-conn" onclick="connect()">连接钱包</button>
    </div>

<script>
const CONTRACT = "0x3f3ad0542415f58d7972ad9e1bd9e51093df0e8f";
let web3, account;

async function connect(){
    if(!window.ethereum){
        alert("请安装 MetaMask 钱包插件！");
        return;
    }
    try{
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        account = accounts[0];
        document.getElementById("addr").innerText = account.slice(0,12)+"..."+account.slice(-8);
        alert("连接成功！");
    }catch(e){
        alert("连接失败："+e.message);
    }
}
</script>
</body>
</html>
