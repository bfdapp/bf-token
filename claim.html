<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>BF 分红领取中心</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;font-family:sans-serif;min-height:100vh;padding:20px 15px;}
        .main-card{max-width:500px;margin:0 auto;background:rgba(30,41,59,0.85);border-radius:20px;padding:30px 25px;border:1px solid rgba(255,215,0,0.2);}
        .title{text-align:center;font-size:24px;font-weight:bold;color:#ffd700;margin-bottom:30px;}
        .info-item{display:flex;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.08);border-radius:12px;margin-bottom:12px;font-size:15px;}
        .info-value{color:#ffd700;font-weight:600;word-break:break-all;text-align:right;}
        .btn{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;}
        .btn:disabled{opacity:0.6;cursor:not-allowed;}
        .btn-connect{background:linear-gradient(90deg,#3b82f6,#2563eb);color:#fff;}
        .btn-claim{background:linear-gradient(90deg,#10b981,#059669);color:#fff;}
        .btn-back{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);}
        .tip-text{text-align:center;margin-top:25px;font-size:13px;color:#94a3b8;line-height:1.6;}

        /* 钱包选择弹窗样式 */
        .wallet-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:999;display:none;}
        .wallet-box{width:85%;max-width:420px;background:#1e293b;border-radius:16px;padding:25px;}
        .wallet-title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:20px;color:#ffd700;}
        .wallet-item{display:flex;align-items:center;padding:15px;background:rgba(255,255,255,0.08);border-radius:12px;margin-bottom:12px;cursor:pointer;transition:0.2s;}
        .wallet-item:hover{background:rgba(255,215,0,0.2);}
        .wallet-name{font-size:16px;margin-left:15px;}
        .close-modal{text-align:center;margin-top:15px;color:#94a3b8;cursor:pointer;padding:10px;}
    </style>
</head>
<body>
    <div class="main-card">
        <h2 class="title">BF 分红领取中心</h2>
        <div class="info-item"><span>钱包地址</span><span class="info-value" id="walletAddr">未连接</span></div>
        <div class="info-item"><span>持有BF数量</span><span class="info-value" id="balanceNum">0.0000</span></div>
        <div class="info-item"><span>可领取分红</span><span class="info-value" id="divNum">0.0000</span></div>
        <div class="info-item"><span>已连接钱包</span><span class="info-value" id="walletType">未连接</span></div>

        <button class="btn btn-connect" onclick="openWalletSelect()">连接钱包</button>
        <button class="btn btn-claim" onclick="manualClaim()">领取分红</button>
        <button class="btn btn-back" onclick="location.href='index.html'">返回首页</button>

        <div class="tip-text">支持全品类主流钱包一键连接</div>
    </div>

    <!-- 钱包选择弹窗 -->
    <div class="wallet-modal" id="walletModal">
        <div class="wallet-box">
            <div class="wallet-title">选择连接钱包</div>
            <div class="wallet-item" onclick="connectMetaMask()">🦊 小狐狸 MetaMask</div>
            <div class="wallet-item" onclick="connectTrust()">💎 Trust Wallet</div>
            <div class="wallet-item" onclick="connectTP()">💰 TP 钱包</div>
            <div class="wallet-item" onclick="connectOKX()">🪙 OKX 钱包</div>
            <div class="wallet-item" onclick="connectBitget()">📈 Bitget 钱包</div>
            <div class="close-modal" onclick="closeWalletSelect()">取消</div>
        </div>
    </div>

<script>
const CONTRACT_ADDR = "0x3f3ad0542415f58d7972ad9e1bd9e51093df0e8f";
const ABI = [
    {"inputs":[],"name":"claimDividend","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"getMyPending","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"a","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let web3,account,contract;
const modal = document.getElementById("walletModal");

// 打开选择弹窗
function openWalletSelect(){
    modal.style.display = "flex";
}
// 关闭弹窗
function closeWalletSelect(){
    modal.style.display = "none";
}

// 统一连接逻辑
async function walletConnect(walletName){
    closeWalletSelect();
    if(!window.ethereum){
        alert(`未检测到${walletName}，请先安装并打开对应钱包`);
        return;
    }
    try{
        let accounts = await ethereum.request({method:"eth_requestAccounts"});
        account = accounts[0];
        web3 = new Web3(ethereum);
        contract = new web3.eth.Contract(ABI,CONTRACT_ADDR);
        document.getElementById("walletAddr").innerText = account.slice(0,12)+"..."+account.slice(-8);
        document.getElementById("walletType").innerText = walletName;
        refreshData();
    }catch(e){
        alert("连接失败："+e.message);
    }
}

// 分别对应各个钱包
function connectMetaMask(){walletConnect("小狐狸 MetaMask")}
function connectTrust(){walletConnect("Trust 钱包")}
function connectTP(){walletConnect("TP 钱包")}
function connectOKX(){walletConnect("OKX 钱包")}
function connectBitget(){walletConnect("Bitget 钱包")}

// 刷新数据
async function refreshData(){
    if(!account)return;
    try{
        let bal = await contract.methods.balanceOf(account).call();
        let pd = await contract.methods.getMyPending().call();
        document.getElementById("balanceNum").innerText = Number(web3.utils.fromWei(bal,"ether")).toFixed(4);
        document.getElementById("divNum").innerText = Number(web3.utils.fromWei(pd,"ether")).toFixed(4);
    }catch(e){}
}

// 领取分红
async function manualClaim(){
    if(!account)return alert("请先选择并连接钱包");
    try{
        await contract.methods.claimDividend().send({from:account});
        alert("分红领取成功！");
        refreshData();
    }catch(e){
        alert("领取失败："+e.message);
    }
}

// 监听钱包切换刷新
if(window.ethereum){
    ethereum.on("accountsChanged",()=>location.reload());
}
</script>
</body>
</html>
