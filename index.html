<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BF 生态官方平台</title>

    <!-- BF 图标 -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: linear-gradient(160deg, #050a18, #101a33);
            color:#fff;
            font-family: "Microsoft Yahei",sans-serif;
            min-height:100vh;
            padding:30px 15px;
        }
        .container{
            max-width:520px;
            margin:0 auto;
            text-align:center;
        }
        .logo{
            width:100px;
            height:100px;
            background:#ffd250;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:50px;
            font-weight:bold;
            color:#101a33;
        }
        .title{
            font-size:26px;
            color:#ffd250;
            margin-bottom:10px;
            font-weight:700;
        }
        .desc{
            color:#94a3b8;
            font-size:15px;
            margin-bottom:30px;
        }

        /* 优化后的内嵌 Swap 面板 */
        .swap-card{
            background:rgba(16,26,51,0.9);
            border-radius:20px;
            padding:20px;
            border:1px solid rgba(255,210,80,0.2);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }
        .swap-title{
            font-size:18px;
            color:#ffd250;
            margin-bottom:15px;
            font-weight:bold;
        }
        iframe{
            width:100%;
            height:480px; /* 调整高度，只保留交易核心区域 */
            border:none;
            border-radius:14px;
            background:#0b1224;
        }

        .btns{
            margin-top:20px;
            display:flex;
            gap:10px;
        }
        .btn{
            flex:1;
            padding:14px;
            border-radius:12px;
            background:linear-gradient(90deg,#407bff,#2554d1);
            color:#fff;
            font-weight:bold;
            border:none;
            cursor:pointer;
        }
        .btn.claim{
            background:linear-gradient(90deg,#27c075,#1a9c5c);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">BF</div>
        <h1 class="title">BF 生态官方平台</h1>
        <p class="desc">一站式交易 | 持仓分红 | 生态应用</p>

        <!-- 优化后的交易面板 -->
        <div class="swap-card">
            <h2 class="swap-title">BNB ↔ BF 官方交易区</h2>
            <!-- 隐藏多余导航，只保留交易核心功能 -->
            <iframe src="https://pancakeswap.finance/swap?inputCurrency=BNB&outputCurrency=0x3f3ad0542415f58d7972ad9e1bd9e51093df0e8f&disableNavbar=true&disableFooter=true"></iframe>
        </div>

        <div class="btns">
            <button class="btn" onclick="window.open('https://bfdapp.github.io/bf-token/claim.html')">分红领取</button>
            <button class="btn claim">官方公告</button>
        </div>
    </div>
</body>
</html>
