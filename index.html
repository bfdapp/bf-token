<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BF 生态官方首页</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(160deg,#050a18,#101a33);color:#fff;font-family:微软雅黑;min-height:100vh;padding:30px 15px;}
.container{max-width:520px;margin:0 auto;text-align:center;}
.logo{width:100px;height:100px;background:#ffd250;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:bold;color:#101a33;}
.title{font-size:26px;color:#ffd250;margin-bottom:10px;font-weight:bold;}
.desc{color:#94a3b8;font-size:15px;margin-bottom:25px;}
.btn-group{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-weight:bold;color:#fff;cursor:pointer;font-size:15px;}
.btn-trade{background:linear-gradient(90deg,#27c075,#1a9c5c);}
.btn-get{background:linear-gradient(90deg,#407bff,#2554d1);}
</style>
</head>
<body>
<div class="container">
    <div class="logo">BF</div>
    <h1 class="title">BF 生态官方平台</h1>
    <p class="desc">一站式交易 | 持仓分红 | 生态应用</p>
    <div class="btn-group">
        <button class="btn btn-trade" onclick="location.href='trade.html'">进入交易专区</button>
        <button class="btn btn-get" onclick="window.open('claim.html')">分红领取中心</button>
    </div>
</div>
</body>
</html>
