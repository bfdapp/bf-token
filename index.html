<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BF 生态官方首页</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:linear-gradient(160deg,#050a18,#101a33);
    color:#fff;
    font-family:Microsoft Yahei,sans-serif;
    min-height:100vh;
    padding:40px 20px;
}
.main-wrap{
    max-width:480px;
    margin:0 auto;
    text-align:center;
}
.main-logo{
    width:90px;
    height:90px;
    background:#ffd250;
    border-radius:50%;
    margin:0 auto 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:46px;
    font-weight:bold;
    color:#101a33;
}
.main-title{
    font-size:24px;
    color:#ffd250;
    font-weight:600;
    margin-bottom:12px;
}
.main-desc{
    font-size:14px;
    color:#94a3b8;
    line-height:1.6;
    margin-bottom:50px;
}
.btn-box{
    display:flex;
    flex-direction:column;
    gap:16px;
}
.home-btn{
    width:100%;
    padding:16px 0;
    border-radius:14px;
    border:none;
    font-size:16px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
}
.btn-trade{
    background:linear-gradient(90deg,#27c075,#1a9c5c);
}
.btn-div{
    background:linear-gradient(90deg,#407bff,#2554d1);
}
.tip-text{
    margin-top:30px;
    font-size:13px;
    color:#78829c;
    line-height:1.5;
}
</style>
</head>
<body>
<div class="main-wrap">
    <div class="main-logo">BF</div>
    <h1 class="main-title">BF 生态官方平台</h1>
    <p class="main-desc">一站式链上交易 ｜ 持仓享生态分红权益</p>

    <div class="btn-box">
        <button class="home-btn btn-trade" onclick="location.href='trade.html'">币币交易中心</button>
        <button class="home-btn btn-div" onclick="window.open('claim.html')">分红领取中心</button>
    </div>

    <p class="tip-text">温馨提示：国内网络无需加速器，支持主流钱包直接连接交易</p>
</div>
</body>
</html>
