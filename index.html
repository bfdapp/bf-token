<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF Token - Official Website</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft Yahei',sans-serif;}
        body{background:#0b1221;color:#fff;}
        .hero{
            background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
            min-height:100vh;
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:20px;text-align:center;
        }
        .logo{
            width:100px;height:100px;
            background:#ffd700;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:36px;font-weight:bold;color:#0b1221;
            margin-bottom:30px;
        }
        .title{font-size:38px;margin-bottom:14px;color:#ffd700;}
        .subtitle{
            font-size:18px;color:#ccc;margin-bottom:40px;
            max-width:500px;line-height:1.6;
        }
        .btn-group{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;}
        .btn{
            padding:16px 20px;border-radius:14px;
            font-size:16px;font-weight:bold;border:none;
            cursor:pointer;transition:0.2s;
        }
        .btn-primary{background:linear-gradient(90deg,#ffd700,#ffc107);color:#111;}
        .btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);}
        .btn:active{transform:scale(0.97);}
        .desc{margin-top:50px;color:#777;font-size:13px;line-height:1.7;}
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">BF</div>
        <h1 class="title">BF Token</h1>
        <p class="subtitle">去中心化持币分红生态 | 持有即收益 | 社区自治 | 链上自动分红</p>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="location.href='claim.html'">进入分红领取中心</button>
            <button class="btn btn-secondary" onclick="alert('官方白皮书即将上线')">查看白皮书</button>
        </div>
        <div class="desc">安全开源 | 链上自动执行 | 100% 去中心化<br>持币 ≥ 10000 BF 即可每日享受全网交易分红</div>
    </div>
</body>
</html>
