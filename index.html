<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF 生态官方首页</title>
    
    <!-- 图标引用代码，和分红页完全一致 -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft Yahei", sans-serif;
            background: linear-gradient(160deg, #050a18, #101a33);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: #ffd250;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .logo-text {
            font-size: 60px;
            color: #101a33;
            font-weight: bold;
        }
        .title {
            font-size: 32px;
            color: #ffd250;
            margin-bottom: 20px;
        }
        .desc {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(90deg, #407bff, #2554d1);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-text">BF</div>
        </div>
        <h1 class="title">BF 生态官方首页</h1>
        <p class="desc">
            欢迎来到 BF 生态，参与社区治理，享受分红权益<br>
            持有 BF 代币，一键领取链上分红奖励
        </p>
        <a href="claim.html" class="btn">前往分红领取中心</a>
    </div>
</body>
</html>
