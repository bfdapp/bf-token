<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BF 双向链上兑换</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0b1224;
    padding:25px 16px;
    font-family:Microsoft Yahei,sans-serif;
}
.trade-container{
    max-width:480px;
    margin:0 auto;
}
.trade-tit{
    text-align:center;
    font-size:18px;
    color:#ffd250;
    font-weight:600;
    margin-bottom:20px;
}
.tab-box{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:12px 0;
    border-radius:10px;
    background:#161e33;
    color:#999;
    font-size:15px;
    cursor:pointer;
}
.tab-item.active{
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
}
.swap-box{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    border:1px solid rgba(255,210,80,0.2);
}
.input-item{
    margin-bottom:15px;
}
.input-item label{
    display:block;
    color:#ccc;
    font-size:14px;
    margin-bottom:6px;
}
.input-item input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#161e33;
    color:#fff;
    font-size:15px;
    outline:none;
}
.swap-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.wallet-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#407bff,#2554d1);
    color:#fff;
    font-size:15px;
    cursor:pointer;
    margin-bottom:10px;
}
.status{
    text-align:center;
    font-size:13px;
    color:#94a3b8;
    margin:12px 0;
}
.balance-box{
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#eee;
    margin-bottom:15px;
}
.back-btn{
    display:block;
    text-align:center;
    margin-top:25px;
    color:#ffd250;
    text-decoration:none;
    font-size:15px;
}
.tips{
    background:rgba(255,210,80,0.1);
    padding:12px;
    border-radius:10px;
    margin:15px 0;
    font-size:13px;
    color:#ffd250;
    line-height:1.6;
}
.hide{display:none;}
</style>
</head>
<body>
<div class="trade-container">
    <h3 class="trade-tit">BNB ↔ BF 双向链上兑换</h3>

    <button class="wallet-btn" id="connectBtn">连接BSC钱包</button>
    <div class="status" id="walletStatus">未连接钱包</div>

    <!-- 余额显示区 -->
    <div class="balance-box" id="balanceBox" style="display:none;">
        BNB余额：<span id="bnbBalance">0.0000</span> &nbsp;&nbsp;
        BF余额：<span id="bfBalance">0.00</span>
    </div>

    <!-- 切换标签 -->
    <div class="tab-box">
        <div class="tab-item active" id="buyTab">BNB买BF</div>
        <div class="tab-item" id="sellTab">BF卖BNB</div>
    </div>

    <!-- 买入板块 -->
    <div class="swap-box" id="buyBox">
        <div class="input-item">
            <label>支付 BNB 数量</label>
            <input type="number" id="payBnb" placeholder="输入BNB数量" min="0" step="0.01">
        </div>
        <div class="input-item">
            <label>预估获得 BF 数量</label>
            <input type="number" id="getBf" placeholder="自动实时估算" readonly>
        </div>
        <button class="swap-btn" id="buyBtn">确认买入BF</button>
    </div>

    <!-- 卖出板块 -->
    <div class="swap-box hide" id="sellBox">
        <div class="input-item">
            <label>卖出 BF 数量</label>
            <input type="number" id="payBf" placeholder="输入BF数量" min="0" step="1">
        </div>
        <div class="input-item">
            <label>预估获得 BNB 数量</label>
            <input type="number" id="getBnb" placeholder="自动实时估算" readonly>
        </div>
        <button class="swap-btn" id="sellBtn">确认卖出换BNB</button>
    </div>

    <div class="tips">
        须知：自动添加切换BSC币安智能链，国内普通网络直连无需加速器，交易采用薄饼官方路由。税费18%，滑点已设20%。
    </div>

    <a href="index.html" class="back-btn">← 返回官方首页</a>
</div>

<script>
// 全局配置
const BSC_CHAIN_ID = 56;
const BF_TOKEN = "0x364a8b5a70ddd45b48fd7aed0ca3c8e826033dad";
const PANCAKE_ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
const SWAP_RATE = 1200;
const SLIPPAGE = 0.8; // 20%滑点，适配18%税

let provider, signer, routerContract, bfContract;

// DOM
const connectBtn = document.getElementById("connectBtn");
const walletStatus = document.getElementById("walletStatus");
const balanceBox = document.getElementById("balanceBox");
const bnbBalance = document.getElementById("bnbBalance");
const bfBalance = document.getElementById("bfBalance");

const buyTab = document.getElementById("buyTab");
const sellTab = document.getElementById("sellTab");
const buyBox = document.getElementById("buyBox");
const sellBox = document.getElementById("sellBox");

const payBnb = document.getElementById("payBnb");
const getBf = document.getElementById("getBf");
const buyBtn = document.getElementById("buyBtn");

const payBf = document.getElementById("payBf");
const getBnb = document.getElementById("getBnb");
const sellBtn = document.getElementById("sellBtn");

// ABI
const ROUTER_ABI = [
    "function swapExactETHForTokens(uint256 amountOutMin, address[] calldata path, address to, uint256 deadline) external payable returns (uint256[] memory amounts)",
    "function swapExactTokensForETH(uint256 amountIn, uint256 amountOutMin, address[] calldata path, address to, uint256 deadline) external returns (uint256[] memory amounts)"
];
const TOKEN_ABI = [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function balanceOf(address owner) external view returns (uint256)"
];

// 标签切换
buyTab.onclick = ()=>{
    buyTab.classList.add("active");
    sellTab.classList.remove("active");
    buyBox.classList.remove("hide");
    sellBox.classList.add("hide");
}
sellTab.onclick = ()=>{
    sellTab.classList.add("active");
    buyTab.classList.remove("active");
    sellBox.classList.remove("hide");
    buyBox.classList.add("hide");
}

// 买入实时计算
payBnb.addEventListener("input",()=>{
    let v = Number(payBnb.value)||0;
    getBf.value = (v * SWAP_RATE).toFixed(2);
})
// 卖出实时计算
payBf.addEventListener("input",()=>{
    let v = Number(payBf.value)||0;
    getBnb.value = (v / SWAP_RATE).toFixed(6);
})

// 自动添加BSC链
async function switchBSC() {
    try {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
                chainId: "0x38",
                chainName: "Binance Smart Chain",
                nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                rpcUrls: ["https://bsc-dataseed1.binance.org"],
                blockExplorerUrls: ["https://bscscan.com"]
            }]
        });
    }catch(e){
        console.error("切换BSC失败",e);
    }
}

// 刷新余额（修复版）
async function refreshBalances(address) {
    try {
        // BNB余额
        const bnbWei = await provider.getBalance(address);
        bnbBalance.innerText = ethers.utils.formatEther(bnbWei).slice(0,6);

        // BF余额（硬写死decimals=18，避免调用失败）
        const bfWei = await bfContract.balanceOf(address);
        bfBalance.innerText = ethers.utils.formatUnits(bfWei, 18).slice(0,5);

        balanceBox.style.display = "block";
    } catch (e) {
        console.error("刷新余额失败", e);
        balanceBox.style.display = "none";
    }
}

// 连接钱包（修复网络判断）
connectBtn.addEventListener("click",async ()=>{
    if(!window.ethereum){
        alert("请安装MetaMask/TP钱包等Web3钱包");
        return;
    }
    try{
        await window.ethereum.request({method:"eth_requestAccounts"});
        await switchBSC();
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        const net = await provider.getNetwork();

        // 强制判断链ID，不是BSC直接提示
        if(net.chainId !== BSC_CHAIN_ID){
            walletStatus.innerText = "请手动切换至BSC智能链";
            balanceBox.style.display = "none";
            return;
        }
        routerContract = new ethers.Contract(PANCAKE_ROUTER, ROUTER_ABI, signer);
        bfContract = new ethers.Contract(BF_TOKEN, TOKEN_ABI, signer);
        const addr = await signer.getAddress();
        walletStatus.innerText = `已连接: ${addr.slice(0,6)}...${addr.slice(-4)}`;
        await refreshBalances(addr);
    }catch(e){
        walletStatus.innerText = "连接失败";
        balanceBox.style.display = "none";
        console.error(e);
    }
})

// 钱包账户/网络变化时自动刷新余额
if (window.ethereum) {
    window.ethereum.on("accountsChanged", async (accounts) => {
        if (accounts.length && signer) {
            await refreshBalances(accounts[0]);
        } else {
            balanceBox.style.display = "none";
        }
    });
    window.ethereum.on("chainChanged", async () => {
        if (signer) {
            const addr = await signer.getAddress();
            await refreshBalances(addr);
        }
    });
}

// BNB买入BF（修复滑点）
buyBtn.addEventListener("click",async ()=>{
    if(!signer) return alert("请先连接钱包");
    let bnbVal = Number(payBnb.value);
    if(!bnbVal||bnbVal<=0) return alert("请输入正确BNB数量");

    buyBtn.innerText = "交易发起中...";
    try{
        const value = ethers.utils.parseEther(bnbVal.toString());
        const minReceive = ethers.utils.parseEther((bnbVal * SWAP_RATE * SLIPPAGE).toFixed(6));
        const path = [WBNB, BF_TOKEN];
        const userAddr = await signer.getAddress();
        const deadline = Math.floor(Date.now()/1000)+600;

        const tx = await routerContract.swapExactETHForTokens(
            minReceive,path,userAddr,deadline,{value:value}
        );
        alert(`买入交易已提交!\n交易哈希:${tx.hash}`);
        await tx.wait();
        alert("买入成功，BF已到账！");
        await refreshBalances(userAddr);
    }catch(e){
        if(e.message.includes("insufficient funds")) alert("BNB余额不足");
        else alert("交易失败："+e.message.substr(0,50));
        console.error(e);
    }
    buyBtn.innerText = "确认买入BF";
})

// BF卖出换BNB（修复滑点）
sellBtn.addEventListener("click",async ()=>{
    if(!signer) return alert("请先连接钱包");
    let bfVal = Number(payBf.value);
    if(!bfVal||bfVal<=0) return alert("请输入正确BF数量");

    sellBtn.innerText = "授权并卖出中...";
    try{
        const userAddr = await signer.getAddress();
        const sellAmount = ethers.utils.parseUnits(bfVal.toString(),18);
        const expectBnb = bfVal / SWAP_RATE;
        const minBnb = ethers.utils.parseEther((expectBnb * SLIPPAGE).toFixed(6));
        const path = [BF_TOKEN, WBNB];
        const deadline = Math.floor(Date.now()/1000)+600;

        // 先授权路由使用BF
        let allowanceTx = await bfContract.approve(PANCAKE_ROUTER,sellAmount);
        await allowanceTx.wait();

        // 执行卖出兑换
        const tx = await routerContract.swapExactTokensForETH(
            sellAmount,minBnb,path,userAddr,deadline
        );
        alert(`卖出交易已提交!\n交易哈希:${tx.hash}`);
        await tx.wait();
        alert("卖出成功，BNB已到账！");
        await refreshBalances(userAddr);
    }catch(e){
        if(e.message.includes("allowance")) alert("授权失败，请重试");
        else alert("交易失败："+e.message.substr(0,50));
        console.error(e);
    }
    sellBtn.innerText = "确认卖出换BNB";
})
</script>
</body>
</html>
