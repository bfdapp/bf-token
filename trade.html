<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BF 双向链上兑换</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0b1224;
    padding:25px 16px;
    font-family:Microsoft Yahei,sans-serif;
}
.trade-container{
    max-width:480px;
    margin:0 auto;
}
.trade-tit{
    text-align:center;
    font-size:18px;
    color:#ffd250;
    font-weight:600;
    margin-bottom:20px;
}
.tab-box{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:12px 0;
    border-radius:10px;
    background:#161e33;
    color:#999;
    font-size:15px;
    cursor:pointer;
}
.tab-item.active{
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
}
.swap-box{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    border:1px solid rgba(255,210,80,0.2);
}
.input-item{
    margin-bottom:15px;
}
.input-item label{
    display:block;
    color:#ccc;
    font-size:14px;
    margin-bottom:6px;
}
.input-item input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#161e33;
    color:#fff;
    font-size:15px;
    outline:none;
}
.swap-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.wallet-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#407bff,#2554d1);
    color:#fff;
    font-size:15px;
    cursor:pointer;
    margin-bottom:10px;
}
.status{
    text-align:center;
    font-size:13px;
    color:#94a3b8;
    margin:12px 0;
}
.balance-box{
    background:rgba(255,210,80,0.1);
    border-radius:10px;
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#eee;
    margin-bottom:15px;
}
.price-box{
    text-align:center;
    color:#ffd250;
    margin-bottom:10px;
    font-size:14px;
}
.back-btn{
    display:block;
    text-align:center;
    margin-top:25px;
    color:#ffd250;
    text-decoration:none;
    font-size:15px;
}
.tips{
    background:rgba(255,210,80,0.1);
    padding:12px;
    border-radius:10px;
    margin:15px 0;
    font-size:13px;
    color:#ffd250;
    line-height:1.6;
}
.hide{display:none;}
</style>
</head>
<body>
<div class="trade-container">
    <h3 class="trade-tit">BNB ↔ BF 双向链上兑换</h3>

    <button class="wallet-btn" id="connectBtn">连接BSC钱包</button>
    <div class="status" id="walletStatus">未连接钱包</div>

    <div class="balance-box" id="balanceBox" style="display:none;">
        BNB余额：<span id="bnbBalance">0.0000</span> &nbsp;&nbsp;
        BF余额：<span id="bfBalance">0.00</span>
    </div>

    <div class="price-box" id="realPrice">
        实时价格：加载中...
    </div>

    <div class="tab-box">
        <div class="tab-item active" id="buyTab">BNB买BF</div>
        <div class="tab-item" id="sellTab">BF卖BNB</div>
    </div>

    <div class="swap-box" id="buyBox">
        <div class="input-item">
            <label>支付 BNB 数量</label>
            <input type="number" id="payBnb" placeholder="输入BNB数量" min="0" step="0.0001">
        </div>
        <div class="input-item">
            <label>预估获得 BF 数量（链上真实）</label>
            <input type="text" id="getBf" placeholder="自动实时计算" readonly>
        </div>
        <button class="swap-btn" id="buyBtn">确认买入BF</button>
    </div>

    <div class="swap-box hide" id="sellBox">
        <div class="input-item">
            <label>卖出 BF 数量</label>
            <input type="number" id="payBf" placeholder="输入BF数量" min="0" step="1">
        </div>
        <div class="input-item">
            <label>预估获得 BNB 数量（链上真实）</label>
            <input type="text" id="getBnb" placeholder="自动实时计算" readonly>
        </div>
        <button class="swap-btn" id="sellBtn">确认卖出换BNB</button>
    </div>

    <div class="tips">
        实时价格从PancakeSwap读取，Bitget/TP钱包无梯子均可正常使用
    </div>
</div>

<script>
const BSC_CHAIN_ID = 56;
const BSC_HEX = "0x38";
const BF_TOKEN = "0x364a8b5a70ddd45b48fd7aed0ca3c8e826033dad";
const ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
const RPC = "https://bsc.publicnode.com";
const SLIPPAGE = 0.75;

let provider, signer, router, bfContract;
let readProvider = new ethers.providers.JsonRpcProvider(RPC, BSC_CHAIN_ID);

const connectBtn = document.getElementById("connectBtn");
const walletStatus = document.getElementById("walletStatus");
const balanceBox = document.getElementById("balanceBox");
const bnbBalance = document.getElementById("bnbBalance");
const bfBalance = document.getElementById("bfBalance");
const realPrice = document.getElementById("realPrice");

const payBnb = document.getElementById("payBnb");
const getBf = document.getElementById("getBf");
const payBf = document.getElementById("payBf");
const getBnb = document.getElementById("getBnb");

const ROUTER_ABI = [
    "function getAmountsOut(uint amountIn, address[] calldata path) external view returns (uint[] memory amounts)",
    "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)",
    "function swapExactTokensForETH(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)"
];

const BEP20_ABI = [
    "function balanceOf(address) external view returns (uint)",
    "function approve(address spender, uint value) external returns (bool)"
];

async function switchBSC() {
    try {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
                chainId: BSC_HEX,
                chainName: "BSC",
                nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                rpcUrls: [RPC],
                blockExplorerUrls: ["https://bscscan.com"]
            }]
        });
    } catch (e) {}
}

async function getOut(amountIn, path) {
    try {
        let r = new ethers.Contract(ROUTER, ROUTER_ABI, readProvider);
        let amt = ethers.utils.parseEther(amountIn.toString());
        let res = await r.getAmountsOut(amt, path);
        return ethers.utils.formatUnits(res[1], 18);
    } catch (e) {
        console.log(e);
        return "0";
    }
}

async function updatePrice() {
    let out = await getOut(1, [WBNB, BF_TOKEN]);
    realPrice.innerText = `实时价格：1 BNB = ${parseFloat(out).toFixed(2)} BF`;
}

async function calcBuy() {
    let val = payBnb.value;
    if (!val || val <= 0) { getBf.value = ""; return; }
    let out = await getOut(val, [WBNB, BF_TOKEN]);
    getBf.value = parseFloat(out).toFixed(2);
}

async function calcSell() {
    let val = payBf.value;
    if (!val || val <= 0) { getBnb.value = ""; return; }
    let out = await getOut(val, [BF_TOKEN, WBNB]);
    getBnb.value = parseFloat(out).toFixed(6);
}

payBnb.oninput = calcBuy;
payBf.oninput = calcSell;

async function loadBalances(addr) {
    try {
        let bnb = await readProvider.getBalance(addr);
        let bf = await new ethers.Contract(BF_TOKEN, BEP20_ABI, readProvider).balanceOf(addr);
        bnbBalance.innerText = ethers.utils.formatEther(bnb).slice(0, 6);
        bfBalance.innerText = ethers.utils.formatUnits(bf, 18).slice(0, 5);
        balanceBox.style.display = "block";
    } catch (e) {
        balanceBox.style.display = "none";
    }
}

connectBtn.onclick = async () => {
    if (!window.ethereum) { alert("请安装钱包"); return; }
    try {
        await window.ethereum.request({ method: "eth_requestAccounts" });
        await switchBSC();
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        let addr = await signer.getAddress();
        walletStatus.innerText = `已连接：${addr.slice(0, 6)}...`;
        router = new ethers.Contract(ROUTER, ROUTER_ABI, signer);
        bfContract = new ethers.Contract(BF_TOKEN, BEP20_ABI, signer);
        loadBalances(addr);
        updatePrice();
    } catch (e) {
        alert("连接失败");
    }
};

document.getElementById("buyBtn").onclick = async () => {
    if (!signer) { alert("请连接钱包"); return; }
    let val = payBnb.value;
    if (!val) return;
    let out = await getOut(val, [WBNB, BF_TOKEN]);
    let minOut = ethers.utils.parseEther((out * SLIPPAGE).toFixed(6));
    let tx = await router.swapExactETHForTokens(minOut, [WBNB, BF_TOKEN], await signer.getAddress(), Math.floor(Date.now()/1000)+600, {
        value: ethers.utils.parseEther(val)
    });
    alert("交易已提交：" + tx.hash);
    await tx.wait();
    alert("买入成功");
    loadBalances(await signer.getAddress());
};

document.getElementById("sellBtn").onclick = async () => {
    if (!signer) { alert("请连接钱包"); return; }
    let val = payBf.value;
    if (!val) return;
    let amt = ethers.utils.parseUnits(val, 18);
    await bfContract.approve(ROUTER, amt);
    let out = await getOut(val, [BF_TOKEN, WBNB]);
    let minOut = ethers.utils.parseEther((out * SLIPPAGE).toFixed(6));
    let tx = await router.swapExactTokensForETH(amt, minOut, [BF_TOKEN, WBNB], await signer.getAddress(), Math.floor(Date.now()/1000)+600);
    alert("交易已提交：" + tx.hash);
    await tx.wait();
    alert("卖出成功");
    loadBalances(await signer.getAddress());
};
</script>
</body>
</html>
