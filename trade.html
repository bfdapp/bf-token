<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=.0,maximum-scale=1.0,user-scalable=no">
<title>BF 双向链上兑换</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0b1224;
    padding:25px 16px;
    font-family:Microsoft Yahei,sans-serif;
}
.trade-container{
    max-width:480px;
    margin:0 auto;
}
.trade-tit{
    text-align:center;
    font-size:18px;
    color:#ffd250;
    font-weight:600;
    margin-bottom:20px;
}
.tab-box{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:12px 0;
    border-radius:10px;
    background:#161e33;
    color:#999;
    font-size:15px;
    cursor:pointer;
}
.tab-item.active{
    background:linear-gradient(90deg,#27c707,#1a9c5c);
    color:#fff;
}
.swap-box{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    border:1px solid rgba(255,210,80,0.2);
}
.input-item{
    margin-bottom:15px;
}
.input-item label{
    display:block;
    color:#ccc;
    font-size:14px;
    margin-bottom:6px;
}
.input-item input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#161e33;
    color:#fff;
    font-size:15px;
    outline:none;
}
.swap-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#27c707,#1a9c5c);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.wallet-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#407bff,#2554d1);
    color:#fff;
    font-size:15px;
    cursor:pointer;
    margin-bottom:10px;
}
.home-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#6c757d;
    color:#fff;
    font-size:15px;
    cursor:pointer;
    margin-bottom:15px;
}
.status{
    text-align:center;
    font-size:13px;
    color:#94a3b8;
    margin:12px 0;
}
.balance-box{
    background:rgba(255,210,80,0.1);
    border-radius:10px;
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#eee;
    margin-bottom:15px;
}
.price-box{
    text-align:center;
    color:#ffd250;
    margin-bottom:10px;
    font-size:14px;
}
.hide{display:none;}
</style>
</head>
<body>
<div class="trade-container">
    <h3 class="trade-tit">BNB ↔ BF 双向链上兑换</h3>

    <button class="home-btn" id="homeBtn">返回主页</button>
    <button class="wallet-btn" id="connectBtn">连接BSC钱包</button>
    <div class="status" id="walletStatus">未连接钱包</div>

    <div class="balance-box" id="balanceBox" style="display:none;">
        BNB余额：<span id="bnbBalance">0.0000</span> &nbsp;&nbsp;
        BF余额：<span id="bfBalance">0.00</span>
    </div>

    <div class="price-box" id="realPrice">实时价格：加载中...</div>

    <div class="tab-box">
        <div class="tab-item active" id="buyTab">BNB买BF</div>
        <div class="tab-item" id="sellTab">BF卖BNB</div>
    </div>

    <div class="swap-box" id="buyBox">
        <div class="input-item">
            <label>支付 BNB 数量</label>
            <input type="number" id="payBnb" placeholder="输入BNB数量" min="0" step="0.0001">
        </div>
        <div class="input-item">
            <label>预估获得 BF</label>
            <input type="text" id="getBf" placeholder="自动计算" readonly>
        </div>
        <button class="swap-btn" id="buyBtn">确认买入BF</button>
    </div>

    <div class="swap-box hide" id="sellBox">
        <div class="input-item">
            <label>卖出 BF 数量</label>
            <input type="number" id="payBf" placeholder="输入BF数量" min="0" step="0.0001">
        </div>
        <div class="input-item">
            <label>预估获得 BNB</label>
            <input type="text" id="getBnb" placeholder="自动计算" readonly>
        </div>
        <button class="swap-btn" id="sellBtn">确认卖出BF</button>
    </div>
</div>

<script>
const BSC_CHAIN_ID = 56;
const BSC_HEX = "0x38";
const BF_TOKEN = "0x364a8b5a70ddd45b48fd7aed0ca3c8e826033dad";
const ROUTER_ADDR = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
const RPC = "https://bsc.publicnode.com";

let provider, signer, router, bfContract;
const readProvider = new ethers.providers.JsonRpcProvider(RPC, BSC_CHAIN_ID);

const homeBtn = document.getElementById("homeBtn");
const connectBtn = document.getElementById("connectBtn");
const walletStatus = document.getElementById("walletStatus");
const balanceBox = document.getElementById("balanceBox");
const bnbBalance = document.getElementById("bnbBalance");
const bfBalance = document.getElementById("bfBalance");
const realPrice = document.getElementById("realPrice");
const payBnb = document.getElementById("payBnb");
const getBf = document.getElementById("getBf");
const payBf = document.getElementById("payBf");
const getBnb = document.getElementById("getBnb");
const buyBtn = document.getElementById("buyBtn");
const sellBtn = document.getElementById("sellBtn");
const buyTab = document.getElementById("buyTab");
const sellTab = document.getElementById("sellTab");
const buyBox = document.getElementById("buyBox");
const sellBox = document.getElementById("sellBox");

const ROUTER_ABI = [
    "function getAmountsOut(uint amountIn, address[] calldata path) external view returns (uint[] memory amounts)",
    "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)",
    "function swapExactTokensForETH(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)"
];

const BEP20_ABI = [
    "function balanceOf(address) external view returns (uint)",
    "function approve(address spender, uint value) external returns (bool)"
];

homeBtn.onclick = function(){
    window.location.href = "index.html";
};

buyTab.onclick = () => {
    buyTab.classList.add("active");
    sellTab.classList.remove("active");
    buyBox.classList.remove("hide");
    sellBox.classList.add("hide");
};
sellTab.onclick = () => {
    sellTab.classList.add("active");
    buyTab.classList.remove("active");
    sellBox.classList.remove("hide");
    buyBox.classList.add("hide");
};

async function switchBSC() {
    try {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
                chainId: BSC_HEX,
                chainName: "BSC",
                nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                rpcUrls: [RPC],
                blockExplorerUrls: ["https://bscscan.com"]
            }]
        });
    } catch (e) {}
}

async function getQuote(amountIn, path) {
    try {
        const r = new ethers.Contract(ROUTER_ADDR, ROUTER_ABI, readProvider);
        const amt = ethers.utils.parseEther(amountIn.toString());
        const out = await r.getAmountsOut(amt, path);
        return ethers.utils.formatUnits(out[1], 18);
    } catch (e) {
        return "0";
    }
}

async function refreshPrice() {
    const out = await getQuote(1, [WBNB, BF_TOKEN]);
    realPrice.innerText = `实时价格：1 BNB = ${parseFloat(out).toFixed(2)} BF`;
}

payBnb.oninput = async () => {
    const v = payBnb.value;
    if (!v || v <= 0) { getBf.value = ""; return; }
    getBf.value = parseFloat(await getQuote(v, [WBNB, BF_TOKEN])).toFixed(2);
};

payBf.oninput = async () => {
    const v = payBf.value;
    if (!v || v <= 0) { getBnb.value = ""; return; }
    getBnb.value = parseFloat(await getQuote(v, [BF_TOKEN, WBNB])).toFixed(6);
};

async function loadBalances(addr) {
    try {
        const bnb = await readProvider.getBalance(addr);
        const bf = await new ethers.Contract(BF_TOKEN, BEP20_ABI, readProvider).balanceOf(addr);
        bnbBalance.innerText = ethers.utils.formatEther(bnb).slice(0, 6);
        bfBalance.innerText = ethers.utils.formatUnits(bf, 18).slice(0, 5);
        balanceBox.style.display = "block";
    } catch (e) {}
}

connectBtn.onclick = async () => {
    if (!window.ethereum) { alert("请安装钱包"); return; }
    try {
        await window.ethereum.request({ method: "eth_requestAccounts" });
        await switchBSC();
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        walletStatus.innerText = `已连接：${addr.slice(0, 6)}...`;
        router = new ethers.Contract(ROUTER_ADDR, ROUTER_ABI, signer);
        bfContract = new ethers.Contract(BF_TOKEN, BEP20_ABI, signer);
        loadBalances(addr);
        refreshPrice();
    } catch (e) {
        alert("连接失败：" + e.message);
    }
};

buyBtn.onclick = async () => {
    try {
        if (!signer) { alert("请连接钱包"); return; }
        const val = payBnb.value;
        if (!val || val <= 0) { alert("输入数量"); return; }
        buyBtn.innerText = "交易中...";
        const out = await getQuote(val, [WBNB, BF_TOKEN]);
        const minOut = ethers.utils.parseEther((out * 0.80).toFixed(6));
        const tx = await router.swapExactETHForTokens(
            minOut,
            [WBNB, BF_TOKEN],
            await signer.getAddress(),
            Math.floor(Date.now() / 1000) + 600,
            { value: ethers.utils.parseEther(val) }
        );
        alert("已提交：" + tx.hash);
        await tx.wait();
        alert("买入成功！");
        loadBalances(await signer.getAddress());
    } catch (e) {
        alert("买入失败：" + e.message);
    } finally {
        buyBtn.innerText = "确认买入BF";
    }
};

sellBtn.onclick = async () => {
    if (!signer) return alert("请先连接钱包");
    const val = Number(payBf.value);
    if (!val || val <= 0) return alert("请输入正确的BF数量");

    sellBtn.innerText = "准备交易...";
    try {
        const userAddr = await signer.getAddress();
        const bfAmount = ethers.utils.parseUnits(val.toString(), 18);

        sellBtn.innerText = "授权中...";
        const approveTx = await bfContract.approve(ROUTER_ADDR, bfAmount);
        await approveTx.wait();

        sellBtn.innerText = "获取报价...";
        const quote = await getQuote(val, [BF_TOKEN, WBNB]);
        if (Number(quote) <= 0) throw new Error("无法获取报价");
        
        const minBNBOut = ethers.utils.parseEther((Number(quote) * 0.75).toFixed(8));

        sellBtn.innerText = "交易中...";
        const deadline = Math.floor(Date.now() / 1000) + 600;
        
        const swapTx = await router.swapExactTokensForETH(
            bfAmount,
            minBNBOut,
            [BF_TOKEN, WBNB],
            userAddr,
            deadline
        );

        alert(`交易已提交！\n哈希：${swapTx.hash}`);
        await swapTx.wait();
        alert("卖出成功，BNB已到账！");
        loadBalances(userAddr);

    } catch (err) {
        console.error(err);
        let msg = "卖出失败，请提高滑点或重试";
        if (err.message.includes("user rejected")) msg = "已取消交易";
        if (err.message.includes("insufficient funds")) msg = "BNB手续费不足";
        if (err.message.includes("transfer amount exceeds balance")) msg = "BF余额不足";
        alert("卖出失败：" + msg);
    } finally {
        sellBtn.innerText = "确认卖出BF";
    }
};
</script>
</body>
</html>
