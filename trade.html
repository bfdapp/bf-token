<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BNB ↔ BF 兑换</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#121212;color:#fff;padding:30px}
.container{max-width:480px;margin:0 auto}
h2{text-align:center;margin-bottom:20px;color:#ffc800}
.btn-wallet{width:100%;padding:14px;border-radius:12px;background:#4d6eff;color:#fff;font-size:16px;border:none;margin-bottom:15px}
.price{text-align:center;color:#ffc800;margin:10px 0}
.balance{background:#1e1e1e;padding:12px;border-radius:12px;text-align:center;margin-bottom:15px}
.tabs{display:flex;gap:10px;margin-bottom:15px}
.tab{flex:1;padding:12px;border-radius:12px;background:#2a2a2a;text-align:center;cursor:pointer}
.tab.active{background:#4d6eff}
.panel{background:#1e1e1e;padding:20px;border-radius:16px}
input{width:100%;padding:14px;margin:10px 0;border-radius:12px;background:#2a2a2a;color:#fff;border:none;font-size:16px}
.btn-swap{width:100%;padding:15px;border-radius:12px;background:#4d6eff;color:#fff;font-size:16px;border:none;margin-top:10px}
.hide{display:none}
</style>
</head>
<body>
<div class="container">
  <h2>BNB ↔ BF 兑换</h2>
  <button class="btn-wallet" id="connect">连接钱包</button>
  <div class="price" id="price">加载价格...</div>
  <div class="balance" id="balance" style="display:none">
    BNB: <span id="bnb">0.0000</span> &nbsp;|&nbsp; BF: <span id="bf">0.000</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabBuy">买入 BF</div>
    <div class="tab" id="tabSell">卖出 BF</div>
  </div>

  <div class="panel" id="buyPanel">
    <input id="buyIn" placeholder="BNB 数量" type="number" step="0.0001">
    <input id="buyOut" placeholder="获得 BF" readonly>
    <button class="btn-swap" id="btnBuy">买入 BF</button>
  </div>

  <div class="panel hide" id="sellPanel">
    <input id="sellIn" placeholder="BF 数量" type="number" step="0.0001">
    <input id="sellOut" placeholder="获得 BNB" readonly>
    <button class="btn-swap" id="btnSell">卖出 BF</button>
  </div>
</div>

<script>
const RPC = "https://bsc.publicnode.com";
const BSC = 56;
const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
const BF = "0x364a8b5a70ddd45b48fd7aed0ca3c8e826033dad";
const ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
const SLIPPAGE = 0.75;

const readProvider = new ethers.providers.JsonRpcProvider(RPC, BSC);
let provider, signer, user, routerContract;

const routerAbi = [
  "function getAmountsOut(uint,address[]) view returns (uint[])",
  "function swapExactETHForTokens(uint,address[],address,uint) payable returns (uint[])",
  "function swapExactTokensForETH(uint,uint,address[],address,uint) returns (uint[])"
];
const bep20Abi = ["function approve(address,uint) returns (bool)", "function balanceOf(address) view returns (uint)"];

async function switchChain() {
  try {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{ chainId: "0x38", chainName: "BSC", nativeCurrency: { symbol: "BNB", decimals: 18 }, rpcUrls: [RPC] }]
    });
  } catch { }
}

async function quote(amt, path) {
  try {
    const r = new ethers.Contract(ROUTER, routerAbi, readProvider);
    const out = await r.getAmountsOut(ethers.utils.parseEther(amt.toString()), path);
    return ethers.utils.formatUnits(out[1], 18);
  } catch { return "0"; }
}

async function loadBalance() {
  if (!user) return;
  const bnb = await readProvider.getBalance(user);
  const bf = await new ethers.Contract(BF, bep20Abi, readProvider).balanceOf(user);
  document.getElementById("bnb").innerText = parseFloat(ethers.utils.formatEther(bnb)).toFixed(4);
  document.getElementById("bf").innerText = parseFloat(ethers.utils.formatUnits(bf, 18)).toFixed(4);
  document.getElementById("balance").style.display = "block";
}

async function updatePrice() {
  const p = await quote(1, [WBNB, BF]);
  document.getElementById("price").innerText = `1 BNB = ${parseFloat(p).toFixed(2)} BF`;
}

document.getElementById("connect").onclick = async () => {
  if (!window.ethereum) return alert("请安装钱包");
  await switchChain();
  await window.ethereum.request({ method: "eth_requestAccounts" });
  provider = new ethers.providers.Web3Provider(window.ethereum);
  signer = provider.getSigner();
  user = await signer.getAddress();
  routerContract = new ethers.Contract(ROUTER, routerAbi, signer);
  document.getElementById("connect").innerText = "已连接";
  loadBalance();
  updatePrice();
};

document.getElementById("tabBuy").onclick = () => {
  document.getElementById("tabBuy").classList.add("active");
  document.getElementById("tabSell").classList.remove("active");
  document.getElementById("buyPanel").classList.remove("hide");
  document.getElementById("sellPanel").classList.add("hide");
};
document.getElementById("tabSell").onclick = () => {
  document.getElementById("tabSell").classList.add("active");
  document.getElementById("tabBuy").classList.remove("active");
  document.getElementById("sellPanel").classList.remove("hide");
  document.getElementById("buyPanel").classList.add("hide");
};

document.getElementById("buyIn").oninput = async () => {
  const v = document.getElementById("buyIn").value;
  if (!v) return document.getElementById("buyOut").value = "";
  document.getElementById("buyOut").value = parseFloat(await quote(v, [WBNB, BF])).toFixed(2);
};
document.getElementById("sellIn").oninput = async () => {
  const v = document.getElementById("sellIn").value;
  if (!v) return document.getElementById("sellOut").value = "";
  document.getElementById("sellOut").value = parseFloat(await quote(v, [BF, WBNB])).toFixed(6);
};

document.getElementById("btnBuy").onclick = async () => {
  try {
    const v = document.getElementById("buyIn").value;
    if (!v) return alert("输入数量");
    const out = await quote(v, [WBNB, BF]);
    const minOut = ethers.utils.parseEther((out * SLIPPAGE).toFixed(6));
    const tx = await routerContract.swapExactETHForTokens(
      minOut, [WBNB, BF], user, Math.floor(Date.now()/1000)+600,
      { value: ethers.utils.parseEther(v) }
    );
    alert("已提交：" + tx.hash);
    await tx.wait();
    alert("买入成功");
    loadBalance();
  } catch (e) { alert("失败：" + e.message); }
};

document.getElementById("btnSell").onclick = async () => {
  try {
    const v = document.getElementById("sellIn").value;
    if (!v) return alert("输入数量");

    // 价格
    const out = await quote(v, [BF, WBNB]);
    const minOut = ethers.utils.parseEther((out * SLIPPAGE).toFixed(6));
    const amountIn = ethers.utils.parseUnits(v, 18);

    // 授权
    const bfContract = new ethers.Contract(BF, bep20Abi, signer);
    const approve = await bfContract.approve(ROUTER, amountIn);
    await approve.wait();

    // 卖出（100% 兼容所有钱包）
    const tx = await routerContract.swapExactTokensForETH(
      amountIn, minOut, [BF, WBNB], user, Math.floor(Date.now()/1000)+600
    );
    alert("已提交：" + tx.hash);
    await tx.wait();
    alert("卖出成功");
    loadBalance();
  } catch (e) {
    alert("卖出失败：" + e.message);
    console.error(e);
  }
};
</script>
</body>
</html>
