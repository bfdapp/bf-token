<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BF 双向链上兑换</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#0b1224;
    padding:25px 16px;
    font-family:Microsoft Yahei,sans-serif;
}
.trade-container{
    max-width:480px;
    margin:0 auto;
}
.trade-tit{
    text-align:center;
    font-size:18px;
    color:#ffd250;
    font-weight:600;
    margin-bottom:20px;
}
.tab-box{
    display:flex;
    gap:8px;
    margin-bottom:15px;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:12px 0;
    border-radius:10px;
    background:#161e33;
    color:#999;
    font-size:15px;
    cursor:pointer;
}
.tab-item.active{
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
}
.swap-box{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    border:1px solid rgba(255,210,80,0.2);
}
.input-item{
    margin-bottom:15px;
}
.input-item label{
    display:block;
    color:#ccc;
    font-size:14px;
    margin-bottom:6px;
}
.input-item input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#161e33;
    color:#fff;
    font-size:15px;
    outline:none;
}
.swap-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#27c075,#1a9c5c);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.wallet-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#407bff,#2554d1);
    color:#fff;
    font-size:15px;
    cursor:pointer;
    margin-bottom:10px;
}
.status{
    text-align:center;
    font-size:13px;
    color:#94a3b8;
    margin:12px 0;
}
.balance-box{
    background:rgba(255,210,80,0.1);
    border-radius:10px;
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#eee;
    margin-bottom:15px;
}
.back-btn{
    display:block;
    text-align:center;
    margin-top:25px;
    color:#ffd250;
    text-decoration:none;
    font-size:15px;
}
.tips{
    background:rgba(255,210,80,0.1);
    padding:12px;
    border-radius:10px;
    margin:15px 0;
    font-size:13px;
    color:#ffd250;
    line-height:1.6;
}
.hide{display:none;}
</style>
</head>
<body>
<div class="trade-container">
    <h3 class="trade-tit">BNB ↔ BF 双向链上兑换</h3>

    <button class="wallet-btn" id="connectBtn">连接BSC钱包</button>
    <div class="status" id="walletStatus">未连接钱包</div>

    <!-- 余额显示区 -->
    <div class="balance-box" id="balanceBox" style="display:none;">
        BNB余额：<span id="bnbBalance">0.0000</span> &nbsp;&nbsp;
        BF余额：<span id="bfBalance">0.00</span>
    </div>

    <!-- 切换标签 -->
    <div class="tab-box">
        <div class="tab-item active" id="buyTab">BNB买BF</div>
        <div class="tab-item" id="sellTab">BF卖BNB</div>
    </div>

    <!-- 买入板块 -->
    <div class="swap-box" id="buyBox">
        <div class="input-item">
            <label>支付 BNB 数量</label>
            <input type="number" id="payBnb" placeholder="输入BNB数量" min="0" step="0.01">
        </div>
        <div class="input-item">
            <label>预估获得 BF 数量</label>
            <input type="number" id="getBf" placeholder="自动实时估算" readonly>
        </div>
        <button class="swap-btn" id="buyBtn">确认买入BF</button>
    </div>

    <!-- 卖出板块 -->
    <div class="swap-box hide" id="sellBox">
        <div class="input-item">
            <label>卖出 BF 数量</label>
            <input type="number" id="payBf" placeholder="输入BF数量" min="0" step="1">
        </div>
        <div class="input-item">
            <label>预估获得 BNB 数量</label>
            <input type="number" id="getBnb" placeholder="自动实时估算" readonly>
        </div>
        <button class="swap-btn" id="sellBtn">确认卖出换BNB</button>
    </div>

    <div class="tips">
        须知：自动切换BSC链，无需加速器，全钱包兼容，税费18%已适配高滑点
    </div>

    <a href="index.html" class="back-btn">← 返回官方首页</a>
</div>

<script>
// 全局配置
const BSC_CHAIN_ID_NUM = 56;
const BSC_CHAIN_ID_HEX = "0x38";
// 国内免翻墙BSC节点（核心解决无梯子Bitget）
const FREE_BSC_RPC = "https://bsc.publicnode.com";
const BF_TOKEN = "0x364a8b5a70ddd45b48fd7aed0ca3c8e826033dad";
const PANCAKE_ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";
const WBNB = "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c";
const SWAP_RATE = 1200;
const SLIPPAGE = 0.8; // 20%滑点适配18%交易税

let provider, signer, routerContract, bfContract;
// 全局备用节点查询器
let freeRpcProvider = new ethers.providers.JsonRpcProvider(FREE_BSC_RPC,56);

// DOM
const connectBtn = document.getElementById("connectBtn");
const walletStatus = document.getElementById("walletStatus");
const balanceBox = document.getElementById("balanceBox");
const bnbBalance = document.getElementById("bnbBalance");
const bfBalance = document.getElementById("bfBalance");

const buyTab = document.getElementById("buyTab");
const sellTab = document.getElementById("sellTab");
const buyBox = document.getElementById("buyBox");
const sellBox = document.getElementById("sellBox");

const payBnb = document.getElementById("payBnb");
const getBf = document.getElementById("getBf");
const buyBtn = document.getElementById("buyBtn");

const payBf = document.getElementById("payBf");
const getBnb = document.getElementById("getBnb");
const sellBtn = document.getElementById("sellBtn");

// ABI
const ROUTER_ABI = [
    "function swapExactETHForTokens(uint256 amountOutMin, address[] calldata path, address to, uint256 deadline) external payable returns (uint256[] memory amounts)",
    "function swapExactTokensForETH(uint256 amountIn, uint256 amountOutMin, address[] calldata path, address to, uint256 deadline) external returns (uint256[] memory amounts)"
];
const TOKEN_ABI = [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function balanceOf(address owner) external view returns (uint256)"
];

// 标签切换
buyTab.onclick = ()=>{
    buyTab.classList.add("active");
    sellTab.classList.remove("active");
    buyBox.classList.remove("hide");
    sellBox.classList.add("hide");
}
sellTab.onclick = ()=>{
    sellTab.classList.add("active");
    buyTab.classList.remove("active");
    sellBox.classList.remove("hide");
    buyBox.classList.add("hide");
}

// 实时换算
payBnb.addEventListener("input",()=>{
    let v = Number(payBnb.value)||0;
    getBf.value = (v * SWAP_RATE).toFixed(2);
})
payBf.addEventListener("input",()=>{
    let v = Number(payBf.value)||0;
    getBnb.value = (v / SWAP_RATE).toFixed(6);
})

// 自动添加BSC链
async function switchBSC() {
    try {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
                chainId: BSC_CHAIN_ID_HEX,
                chainName: "Binance Smart Chain",
                nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                rpcUrls: [FREE_BSC_RPC],
                blockExplorerUrls: ["https://bscscan.com"]
            }]
        });
    }catch(e){}
}

// 余额查询：优先钱包节点，失败直接用国内免费节点（完美兼容Bitget）
async function refreshBalances(walletAddr) {
    let bnbNum,bfNum;
    try{
        // 优先钱包自身节点
        let bnbWei = await provider.getBalance(walletAddr);
        let bfWei = await bfContract.balanceOf(walletAddr);
        bnbNum = ethers.utils.formatEther(bnbWei);
        bfNum = ethers.utils.formatUnits(bfWei,18);
    }catch(err){
        // 钱包节点被墙，强制用国内免翻墙节点
        let bnbWei = await freeRpcProvider.getBalance(walletAddr);
        let bfCon = new ethers.Contract(BF_TOKEN,TOKEN_ABI,freeRpcProvider);
        let bfWei = await bfCon.balanceOf(walletAddr);
        bnbNum = ethers.utils.formatEther(bnbWei);
        bfNum = ethers.utils.formatUnits(bfWei,18);
    }
    bnbBalance.innerText = bnbNum.slice(0,6);
    bfBalance.innerText = bfNum.slice(0,5);
    balanceBox.style.display = "block";
}

// 连接钱包
connectBtn.addEventListener("click",async ()=>{
    if(!window.ethereum){
        alert("请安装TP/Bitget/小狐狸钱包");
        return;
    }
    try{
        await window.ethereum.request({method:"eth_requestAccounts"});
        await switchBSC();
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        let net = await provider.getNetwork();
        let isBsc = net.chainId === BSC_CHAIN_ID_NUM || net.chainId === BSC_CHAIN_ID_HEX;
        if(!isBsc){
            walletStatus.innerText = "请切换至BSC币安智能链";
            balanceBox.style.display = "none";
            return;
        }
        routerContract = new ethers.Contract(PANCAKE_ROUTER,ROUTER_ABI,signer);
        bfContract = new ethers.Contract(BF_TOKEN,TOKEN_ABI,signer);
        let addr = await signer.getAddress();
        walletStatus.innerText = `已连接: ${addr.slice(0,6)}...${addr.slice(-4)}`;
        await refreshBalances(addr);
    }catch(e){
        walletStatus.innerText = "连接失败";
        balanceBox.style.display = "none";
    }
})

// 账户切换自动刷新余额
if(window.ethereum){
    window.ethereum.on("accountsChanged",async (accs)=>{
        if(accs.length&&signer) refreshBalances(accs[0]);
        else balanceBox.style.display="none";
    });
}

// BNB买入BF
buyBtn.addEventListener("click",async ()=>{
    if(!signer) return alert("请先连接钱包");
    let num = Number(payBnb.value);
    if(!num||num<=0) return alert("请输入正确BNB数量");
    buyBtn.innerText="交易提交中...";
    try{
        let val = ethers.utils.parseEther(num.toString());
        let minGet = ethers.utils.parseEther((num*SWAP_RATE*SLIPPAGE).toFixed(6));
        let user = await signer.getAddress();
        let deadline = Math.floor(Date.now()/1000)+600;
        let tx = await routerContract.swapExactETHForTokens(minGet,[WBNB,BF_TOKEN],user,deadline,{value:val});
        alert(`交易已提交\n哈希：${tx.hash}`);
        await tx.wait();
        alert("买入成功，代币已到账！");
        refreshBalances(user);
    }catch(e){
        if(e.message.includes("insufficient funds")) alert("BNB余额不足");
        else alert("交易失败，请检查数量与滑点");
    }
    buyBtn.innerText="确认买入BF";
})

// BF卖出换BNB
sellBtn.addEventListener("click",async ()=>{
    if(!signer) return alert("请先连接钱包");
    let num = Number(payBf.value);
    if(!num||num<=0) return alert("请输入正确BF数量");
    sellBtn.innerText="授权卖出中...";
    try{
        let user = await signer.getAddress();
        let sellAmount = ethers.utils.parseUnits(num.toString(),18);
        let expectBnb = num/SWAP_RATE;
        let minOut = ethers.utils.parseEther((expectBnb*SLIPPAGE).toFixed(6));
        let deadline = Math.floor(Date.now()/1000)+600;
        // 授权
        let appTx = await bfContract.approve(PANCAKE_ROUTER,sellAmount);
        await appTx.wait();
        // 交易
        let tx = await routerContract.swapExactTokensForETH(sellAmount,minOut,[BF_TOKEN,WBNB],user,deadline);
        alert(`交易已提交\n哈希：${tx.hash}`);
        await tx.wait();
        alert("卖出成功，BNB已到账！");
        refreshBalances(user);
    }catch(e){
        if(e.message.includes("allowance")) alert("授权失败，请重试");
        else alert("交易失败，请稍后重试");
    }
    sellBtn.innerText="确认卖出换BNB";
})
</script>
</body>
</html>
